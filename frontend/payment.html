<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="FUL RESTAURANT payment — Scan QR code to complete your order." />
  <title>Payment — FUL RESTAURANT</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .qr-display {
      text-align: center;
      padding: 40px 20px;
    }
    
    .qr-display img {
      width: 350px;
      height: 350px;
      margin: 30px auto;
      display: block;
      border: 3px solid var(--stone-light);
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    
    .qr-order-id {
      font-size: 1.5em;
      font-weight: 600;
      color: var(--stone);
      margin-bottom: 15px;
    }
    
    .qr-instruction {
      font-size: 1.1em;
      color: var(--stone-light);
      margin: 20px 0;
    }
    
    .qr-payment-url {
      font-size: 0.9em;
      color: var(--stone-light);
      margin-top: 20px;
      word-break: break-all;
      padding: 16px;
      background: var(--cream);
      border-radius: 8px;
    }
    
    .qr-error {
      color: var(--accent);
      margin-top: 20px;
      padding: 16px;
      background: #ffeaea;
      border-radius: 8px;
      border-left: 4px solid var(--accent);
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════
       NAVIGATION
  ══════════════════════════════════════ -->
  <nav class="nav" role="navigation" aria-label="Main navigation">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">FUL <span>RESTAURANT</span></a>

      <ul class="nav-links" role="list">
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li>
          <a href="cart.html" class="cart-link">
            Cart
            <span class="cart-badge" aria-label="Items in cart" style="display:none">0</span>
          </a>
        </li>
        <li><a href="orders.html">Orders</a></li>
      </ul>

      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- ══════════════════════════════════════
       PAGE CONTENT
  ══════════════════════════════════════ -->
  <main class="page-wrapper" role="main">

    <!-- Page header -->
    <header class="page-header">
      <span class="eyebrow">Secure Payment</span>
      <h1>Scan to Pay</h1>
      <p>Use your mobile banking app to scan the QR code and complete payment.</p>
    </header>

    <!-- QR Code Display -->
    <section class="qr-display" aria-label="Payment QR Code">
      <div class="qr-order-id" id="order-id"></div>
      <div class="qr-instruction">Scan the QR code with your mobile banking app</div>
      <div id="qr"></div>
      <div class="qr-payment-url" id="pay-url"></div>
      <div class="qr-error" id="qr-error" style="display: none;"></div>
    </section>

  </main>

  <!-- ══════════════════════════════════════
       FOOTER
  ══════════════════════════════════════ -->
  <footer class="footer" role="contentinfo">
    <div class="footer-inner">
      <span class="footer-logo">FUL RESTAURANT</span>
      <span class="footer-copy">© 2024 FUL RESTAURANT. All rights reserved.</span>
    </div>
  </footer>

  <script src="utils.js"></script>
  <script src="payment.js"></script>
</body>
</html>
</html>
