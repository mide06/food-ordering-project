<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Menu — Admin Panel</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
<div class="admin-layout">

  <!-- ══════════════════════════════════
       SIDEBAR
  ══════════════════════════════════ -->
  <aside class="sidebar" role="navigation" aria-label="Admin navigation">
    <div class="sidebar-brand">
      <div class="sidebar-brand-name">
        <div class="brand-icon" aria-hidden="true">🍽</div>
        FoodAdmin
      </div>
      <div class="sidebar-subtitle">Admin Panel</div>
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-nav-section">Main</div>
      <a href="dashboard.html" class="sidebar-link">
        <span class="link-icon">▤</span> Dashboard
      </a>
      <a href="menu.html" class="sidebar-link">
        <span class="link-icon">☰</span> Manage Menu
      </a>
      <a href="orders.html" class="sidebar-link">
        <span class="link-icon">📋</span> Orders
      </a>
      <div class="sidebar-nav-section" style="margin-top:16px">Customer Side</div>
      <a href="../index.html" class="sidebar-link" target="_blank">
        <span class="link-icon">↗</span> Customer App
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" class="sidebar-link" id="logout-btn">
        <span class="link-icon">⏻</span> Logout
      </a>
    </div>
  </aside>

  <!-- ══════════════════════════════════
       MAIN CONTENT
  ══════════════════════════════════ -->
  <div class="main-content">

    <div class="topbar">
      <span class="topbar-title">Manage Menu</span>
      <div class="topbar-right">
        <span class="topbar-badge" id="item-count">—</span>
      </div>
    </div>

    <div class="page-body">

      <!-- ══════════════════════════════
           ADD NEW ITEM FORM
           Connects to: POST /api/menu
      ══════════════════════════════ -->
      <div class="form-card">
        <div class="form-card-title">
          <span>＋</span> Add New Menu Item
        </div>

        <!--
          On submit → admin-menu.js handleAddItem()
          → POST /api/menu { name, category, price, description, available }
        -->
        <form id="add-item-form" novalidate>
          <div class="form-grid form-grid--wide">

            <div class="form-field">
              <label class="form-label" for="new-name">Name *</label>
              <input
                class="form-input"
                type="text"
                id="new-name"
                placeholder="e.g. Truffle Risotto"
                required
                autocomplete="off"
              />
            </div>

            <div class="form-field">
              <label class="form-label" for="new-image">Image</label>
              <input
                class="form-input"
                type="file"
                id="new-image"
                accept="image/*"
              />
            </div>

            <div class="form-field">
              <label class="form-label" for="new-category">Category</label>
              <input
                class="form-input"
                type="text"
                id="new-category"
                placeholder="e.g. Mains, Desserts"
                list="category-suggestions"
                autocomplete="off"
              />
              <!-- Datalist hints populated from existing categories -->
              <datalist id="category-suggestions"></datalist>
            </div>

            <div class="form-field">
              <label class="form-label" for="new-price">Price (USD) *</label>
              <input
                class="form-input"
                type="number"
                id="new-price"
                placeholder="0.00"
                step="0.01"
                min="0"
                required
              />
            </div>

            <div class="form-field">
              <label class="form-label" for="new-available">Availability</label>
              <select class="form-select" id="new-available">
                <option value="true">Available</option>
                <option value="false">Unavailable</option>
              </select>
            </div>

            <div class="form-field form-field--full">
              <label class="form-label" for="new-description">Description</label>
              <input
                class="form-input"
                type="text"
                id="new-description"
                placeholder="Short description of the dish…"
              />
            </div>

            <div class="form-actions">
              <button type="submit" class="btn btn-primary btn-lg">
                + Add Item
              </button>
              <button type="reset" class="btn btn-outline">
                Clear
              </button>
            </div>

          </div>
        </form>
      </div>

      <!-- ══════════════════════════════
           MENU ITEMS TABLE
           Connects to: GET /api/menu (load)
                        PATCH /api/menu/:id (edit)
                        DELETE /api/menu/:id (delete)
                        PATCH /api/menu/:id/availability (toggle)
      ══════════════════════════════ -->
      <div class="section-header">
        <span class="section-title">All Menu Items</span>
        <div class="flex gap-8">
          <input
            class="form-input"
            type="search"
            id="menu-search"
            placeholder="Search items…"
            style="width:200px"
            aria-label="Search menu items"
          />
        </div>
      </div>

      <div class="table-card">
        <div class="table-scroll">
          <table class="data-table" aria-label="Menu items">
            <thead>
              <tr>
                <th style="width:60px">ID</th>
                <th>Name</th>
                <th style="width:110px">Category</th>
                <th style="width:80px">Price</th>
                <th>Description</th>
                <th style="width:100px">Image</th>
                <th style="width:110px">Status</th>
                <th style="width:240px">Actions</th>
              </tr>
            </thead>
            <tbody id="menu-tbody">
              <!-- Populated by admin-menu.js → GET /api/menu -->
            </tbody>
          </table>
        </div>
      </div>

    </div><!-- /page-body -->
  </div><!-- /main-content -->
</div><!-- /admin-layout -->

<!-- ══════════════════════════════════
     DELETE CONFIRM MODAL
     Shown when user clicks "Delete" on a menu item
══════════════════════════════════ -->
<div id="delete-modal" class="modal-overlay" role="dialog" aria-modal="true"
  aria-labelledby="delete-modal-title">
  <div class="modal">
    <div class="modal-title" id="delete-modal-title">Confirm Delete</div>
    <p style="font-size:0.88rem;color:var(--text-secondary);line-height:1.6">
      Are you sure you want to delete
      <strong id="delete-item-name">this item</strong>?
      This action cannot be undone.
    </p>
    <div class="modal-actions">
      <button id="cancel-delete-btn" class="btn btn-outline">Cancel</button>
      <button id="confirm-delete-btn" class="btn btn-danger">Yes, Delete</button>
    </div>
  </div>
</div>

<div id="toast-container" role="status" aria-live="polite"></div>

<script src="admin-utils.js"></script>
<script src="admin-menu.js"></script>
<script>
  // Populate category datalist after menu loads
  document.addEventListener('DOMContentLoaded', () => {
    // Refresh datalist suggestions after menu data is loaded
    const observer = new MutationObserver(() => {
      const tbody = document.getElementById('menu-tbody');
      if (!tbody || tbody.querySelector('.loading-row')) return;
      // Extract unique categories from rendered rows
      const dl = document.getElementById('category-suggestions');
      if (!dl) return;
      const seen = new Set();
      tbody.querySelectorAll('td:nth-child(3)').forEach(td => {
        const v = td.textContent.trim();
        if (v && v !== '—' && !seen.has(v)) {
          seen.add(v);
          const opt = document.createElement('option');
          opt.value = v;
          dl.appendChild(opt);
        }
      });
    });
    observer.observe(document.getElementById('menu-tbody') || document.body, { childList: true, subtree: false });

    document.getElementById('logout-btn')?.addEventListener('click', e => {
      e.preventDefault();
      if (confirm('Log out?')) showToast('Logged out.', 'info');
    });
  });
</script>
</body>
</html>
