<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="FUL RESTAURANT menu — Browse our seasonal selection of starters, mains, desserts and more." />
  <title>Menu — FUL RESTAURANT</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════
       NAVIGATION
  ══════════════════════════════════════ -->
  <nav class="nav" role="navigation" aria-label="Main navigation">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">FUL <span>RESTAURANT</span></a>

      <ul class="nav-links" role="list">
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html" class="active">Menu</a></li>
        <li>
          <a href="cart.html" class="cart-link">
            Cart
            <span class="cart-badge" aria-label="Items in cart" style="display:none">0</span>
          </a>
        </li>
        <li><a href="orders.html">Orders</a></li>
      </ul>

      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- ══════════════════════════════════════
       PAGE CONTENT
  ══════════════════════════════════════ -->
  <main class="page-wrapper" role="main">

    <!-- Page header -->
    <header class="page-header">
      <span class="eyebrow">Curated Selections</span>
      <h1>Our Menu</h1>
      <p>Seasonal ingredients, timeless techniques. Something for every palate.</p>
    </header>

    <!-- Category filter bar -->
    <div
      id="filter-bar"
      class="filter-bar"
      role="group"
      aria-label="Filter menu by category"
    >
      <!-- Populated by menu.js -->
      <div class="loading-spinner" style="padding:10px">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- Loading state -->
    <div
      id="menu-loading"
      class="loading-spinner"
      aria-live="polite"
      aria-label="Loading menu items"
      style="display:flex"
    >
      <div class="spinner"></div>
      <span>Preparing the menu…</span>
    </div>

    <!-- Menu grid — populated by menu.js -->
    <section
      id="menu-grid"
      class="menu-grid"
      aria-label="Menu items"
    ></section>

  </main>

  <!-- ══════════════════════════════════════
       FOOTER
  ══════════════════════════════════════ -->
  <footer class="footer" role="contentinfo">
    <div class="footer-inner">
      <span class="footer-logo">FUL RESTAURANT</span>
      <span class="footer-copy">© 2024 FUL RESTAURANT. All rights reserved.</span>
    </div>
  </footer>

  <div id="toast-container" role="status" aria-live="polite"></div>

  <script src="utils.js"></script>
  <script src="menu.js"></script>
</body>
</html>
